services:
  postgres:
    image: postgres:15
    container_name: tecprime_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: tecprime_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tecprime_db"]
      interval: 5s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tecprime_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: 123456
      DB_NAME: tecprime_db
      PORT: 3333
      JWT_SECRET: super_secret_change_me
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:4200
    ports:
      - "3333:3333"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tecprime_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres_data:

